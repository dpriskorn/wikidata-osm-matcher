object_type: bathing_place
label: "Badplatser"
qid: Q567998  # Bathing place (Swimming facility)

wikidata:
  node_property: P11693
  way_property: P10689
  relation_property: P402
  not_found_property: P9660
  not_found_qualifier: P5017

  division_coordinates:
    sparql_query: |
      PREFIX wd: <http://www.wikidata.org/entity/>
      PREFIX wdt: <http://www.wikidata.org/prop/direct/>
      SELECT DISTINCT ?division ?coord WHERE {
        VALUES ?division {?divisions_values}
        ?division wdt:P625 ?coord .
      }
    values_variable: divisions_values
    country_variable: country
    coord_variable: coord

  candidates:
    sparql_query: |
      PREFIX wd: <http://www.wikidata.org/entity/>
      PREFIX wdt: <http://www.wikidata.org/prop/direct/>
      SELECT DISTINCT ?item ?coord ?division ?country ?badkartan ?naturkartan ?commons ?commonsSitelink WHERE {
        ?item wdt:P31/wdt:P279* wd:Q567998 .
        ?item wdt:P625 ?coord .
        ?item wdt:P17 ?country .
        ?item wdt:P131 ?division .
        OPTIONAL { ?item wdt:P9615 ?badkartan }
        OPTIONAL { ?item wdt:P10467 ?naturkartan }
        OPTIONAL { ?item wdt:P373 ?commons }
        OPTIONAL { ?item schema:about ?s . ?s schema:isPartOf <https://commons.wikimedia.org/> }
        FILTER (BOUND(?commons) || BOUND(?s))
        BIND(COALESCE(?commons, ?s) AS ?commonsSitelink)
        MINUS { ?item wdt:P10689 [] } # way
        MINUS { ?item wdt:P402 [] } # rel
        MINUS { ?item wdt:P11693 [] } # node
      }
    label_variable: itemLabel
    coord_variable: coord

overpass:
  query: |
    [out:json][timeout:10];
    (
      nwr["leisure"="bathing_place"]({{bbox}});
      nwr["natural"="beach"]({{bbox}});
      nwr["sport"="swimming"]({{bbox}});
    );
    out body center;
  bbox_from_coord: true
  bbox_radius_km: 0.5
  timeout: 10

matching:
  method: bbox
  similarity_threshold: 0.25
  exclude_words:
    - "badplats"
    - "strand"
    - "bathing"
    - "beach"
